{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "php-multisite.fullname" . }}
  labels:
    {{- include "php-multisite.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    {{- range .Values.domains.list }}
    - hosts:
        - {{ . | quote }}
      # Generate unique secret name per domain
      secretName: {{ printf "%s-%s-tls" (include "php-multisite.fullname" $) (. | replace "." "-") }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.domains.list }}
    - host: {{ . | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "php-multisite.fullname" $ }}
                port:
                  number: 80
    {{- end }}
{{- end }}