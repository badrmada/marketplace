apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "php-multisite.fullname" . }}-nginx
  labels:
    {{- include "php-multisite.labels" . | nindent 4 }}
data:
  nginx.conf: |
    # Run as non-root user
    user nginx;
    
    # Worker processes
    worker_processes {{ .Values.nginx.workerProcesses }};
    
    # Error log
    error_log /var/log/nginx/error.log warn;
    pid /var/run/nginx.pid;
    
    events {
        worker_connections {{ .Values.nginx.workerConnections }};
        use epoll;
        multi_accept on;
    }
    
    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;
        
        # Logging
        log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$http_x_forwarded_for"';
        
        access_log /var/log/nginx/access.log main;
        
        # Performance optimizations
        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
        keepalive_timeout 65;
        types_hash_max_size 2048;
        server_tokens off;
        
        # Buffer sizes
        client_body_buffer_size 128k;
        client_max_body_size {{ .Values.nginx.clientMaxBodySize }};
        client_header_buffer_size 1k;
        large_client_header_buffers 4 16k;
        
        # Timeouts
        client_body_timeout 12;
        client_header_timeout 12;
        send_timeout 10;
        
        # Gzip compression
        gzip on;
        gzip_vary on;
        gzip_proxied any;
        gzip_comp_level 6;
        gzip_types text/plain text/css text/xml text/javascript 
                   application/json application/javascript application/xml+rss 
                   application/rss+xml font/truetype font/opentype 
                   application/vnd.ms-fontobject image/svg+xml;
        gzip_disable "msie6";
        
        # FastCGI cache (optional, can be enabled for performance)
        # fastcgi_cache_path /var/cache/nginx levels=1:2 keys_zone=phpcache:100m inactive=60m;
        # fastcgi_cache_key "$scheme$request_method$host$request_uri";
        
        # Include virtual host configurations
        include /etc/nginx/conf.d/*.conf;
    }