apiVersion: v1
kind: Service
metadata:
  name: {{ include "php-multisite.fullname" . }}
  labels:
    {{- include "php-multisite.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "php-multisite.selectorLabels" . | nindent 4 }}