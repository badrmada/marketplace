apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "php-multisite.fullname" . }}-vhosts
  labels:
    {{- include "php-multisite.labels" . | nindent 4 }}
data:
  # Default server (catch-all) - handles health checks
  default.conf: |
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;
        
        root /var/www/html;
        index index.html index.htm;
        
        # Health check endpoint
        location = / {
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
        
        location = /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
        
        # Catch all other requests to default server
        location / {
            return 404;
        }
    }
  
  {{- if .Values.tinyFileManager.enabled }}
  # TinyFileManager server block
  filemanager.conf: |
    server {
        listen 80;
        listen [::]:80;
        
        server_name {{ .Values.ingress.filemanager.host }};
        
        root /var/www/html/filemanager;
        index index.php;
        
        charset utf-8;
        
        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        
        # Logging
        access_log /var/log/nginx/filemanager-access.log main;
        error_log /var/log/nginx/filemanager-error.log warn;
        
        # Main location
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }
        
        # PHP processing
        location ~ \.php$ {
            try_files $uri =404;
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            
            include fastcgi_params;
            
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;
            fastcgi_param SERVER_PORT 80;
            fastcgi_param HTTP_HOST $http_host;
            fastcgi_param SERVER_NAME $server_name;
            fastcgi_param REQUEST_SCHEME $scheme;
            fastcgi_param HTTPS $https if_not_empty;
            
            # Forward Traefik auth headers to PHP
            fastcgi_param HTTP_X_USER_ID $http_x_user_id;
            fastcgi_param HTTP_X_USER_EMAIL $http_x_user_email;
            fastcgi_param HTTP_X_USER_NAMESPACE $http_x_user_namespace;
            fastcgi_param HTTP_X_TARGET_DOMAIN $http_x_target_domain;
            fastcgi_param HTTP_X_ALLOWED_DOMAINS $http_x_allowed_domains;
            
            # For applications behind proxy/ingress
            fastcgi_param HTTP_X_FORWARDED_HOST $http_x_forwarded_host;
            fastcgi_param HTTP_X_FORWARDED_PORT $http_x_forwarded_port;
            fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
            
            # PHP-FPM timeouts for large file operations
            fastcgi_connect_timeout 300s;
            fastcgi_send_timeout 300s;
            fastcgi_read_timeout 300s;
            fastcgi_buffer_size 128k;
            fastcgi_buffers 256 16k;
            fastcgi_busy_buffers_size 256k;
            fastcgi_temp_file_write_size 256k;
            
            fastcgi_param REMOTE_ADDR $remote_addr;
            fastcgi_param HTTP_X_REAL_IP $http_x_real_ip;
            fastcgi_param HTTP_X_FORWARDED_FOR $http_x_forwarded_for;
        }
        
        # Deny access to hidden files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
        
        # Deny access to sensitive files
        location ~ /(config|configuration)\.php$ {
            internal;
        }
        
        # Static assets with long cache
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }
  {{- end }}
  
  {{- range .Values.domains.list }}
  # Virtual host for {{ . }}
  {{ . | replace "." "-" }}.conf: |
    server {
        listen 80;
        listen [::]:80;
        server_name {{ . }} www.{{ . }};
        
        root /var/www/html/domains/{{ . }};
        index index.php index.html index.htm;
        
        charset utf-8;
        
        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        
        # Logging
        access_log /var/log/nginx/{{ . | replace "." "-" }}-access.log main;
        error_log /var/log/nginx/{{ . | replace "." "-" }}-error.log warn;
        
        # Main location
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }
        
        # PHP processing
        location ~ \.php$ {
            try_files $uri =404;
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;
            
            include fastcgi_params;
            
            fastcgi_param SERVER_NAME $server_name;
            fastcgi_param HTTP_HOST $http_host;

            # PHP-FPM tuning
            fastcgi_connect_timeout {{ $.Values.php.ini.max_execution_time }}s;
            fastcgi_send_timeout {{ $.Values.php.ini.max_execution_time }}s;
            fastcgi_read_timeout {{ $.Values.php.ini.max_execution_time }}s;
            fastcgi_buffer_size 128k;
            fastcgi_buffers 256 16k;
            fastcgi_busy_buffers_size 256k;
            fastcgi_temp_file_write_size 256k;
        }
        
        # Security - deny access to hidden files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
        
        # Deny access to sensitive files
        location ~* \.(git|env|htaccess|htpasswd|gitignore)$ {
            deny all;
            return 404;
        }
        
        # Deny access to composer/package files
        location ~ /(composer\.(json|lock)|package(-lock)?\.json|yarn\.lock)$ {
            deny all;
            return 404;
        }
        
        # WordPress specific security
        location ~ /wp-config\.php$ {
            deny all;
            return 404;
        }
        
        # Static files caching
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
        
        # Favicon - don't log
        location = /favicon.ico {
            access_log off;
            log_not_found off;
        }
        
        # Robots - don't log
        location = /robots.txt {
            access_log off;
            log_not_found off;
        }
    }
  {{- end }}